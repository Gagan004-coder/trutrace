services:
  # ── Backend API (Node/Express) ──────────────────────────────────────────────
  - type: web
    name: trutrace-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: TIDB_HOST
        sync: false
      - key: TIDB_PORT
        value: 4000
      - key: TIDB_USER
        sync: false
      - key: TIDB_PASSWORD
        sync: false
      - key: TIDB_DATABASE
        value: trutrace
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          name: trutrace-frontend
          type: web
          property: host
          envVarKey: RENDER_EXTERNAL_URL

  # ── Frontend (React/Vite Static Site) ──────────────────────────────────────
  - type: web
    name: trutrace-frontend
    runtime: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: trutrace-api
          type: web
          property: host
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
