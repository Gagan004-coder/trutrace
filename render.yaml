services:
  # ── TruTrace: Full-stack (Express API + React frontend) ─────────────────────
  # Express serves the built React app from ./dist in production.
  - type: web
    name: trutrace
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: TIDB_HOST
        sync: false
      - key: TIDB_PORT
        value: 4000
      - key: TIDB_USER
        sync: false
      - key: TIDB_PASSWORD
        sync: false
      - key: TIDB_DATABASE
        value: trutrace
      - key: JWT_SECRET
        generateValue: true

